name: Full Pipeline

on:
  push:
    branches: 
      - main

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run tests
        run: |
          echo "Running tests"
          echo "All tests are passed"
  
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v3
    - name: Build app
      run : |
        echo "Building app...."
        echo "Build successfully......."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Deploy app
        run: |
          echo "Deploying to production"
          echo " Deploying successfully"
          echo "App is live"
  
