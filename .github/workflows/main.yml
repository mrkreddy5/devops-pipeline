name: Docker Build Pipeline

on:
  push:
    branches: 
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create Dockerfile
        run: |
          cat > Dockerfile <<'EOF'
          FROM python:3.12-slim
          WORKDIR /app
          COPY app.py
          CMD ["python", "app.py"]
          EOF

      - name: create app
        run: |
          cat>app.py<<'EOF'
          print("Hello from CI/CD pipeline")
          print("This was build automatically")
          EOF

      - name: Build Docker Image
        run: |
          docker build -t myapp:latest .
          docker images
          
      - name: Test Docker image
        run: |
          docker run myapp:latest

      - name: Build successfully
        run: echo "Docker image built and tested"
